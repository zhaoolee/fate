name: Build Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            artifact_name: Fate-windows
          - name: macos
            os: macos-latest
            artifact_name: Fate-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python for packaging
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"

      - name: Install Windows bundling tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis wixtoolset -y

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build

      - name: Archive installers
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.artifact_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED
          import os

          bundle_dir = Path("src-tauri/target/release/bundle")
          out_dir = Path("release-assets")
          out_dir.mkdir(exist_ok=True)
          asset = out_dir / f"{os.environ['ASSET_NAME']}.zip"
          release_dir = Path("src-tauri/target/release")

          files = []
          if bundle_dir.exists():
              files = [
                  (path, path.relative_to(bundle_dir))
                  for path in bundle_dir.rglob("*")
                  if path.is_file()
              ]
          elif os.environ.get("RUNNER_OS") == "Windows":
              exe_files = sorted(release_dir.glob("*.exe"))
              dll_files = sorted(release_dir.glob("*.dll"))
              resources_dir = release_dir / "resources"

              files = [(path, "Fate.exe" if path.name.lower() == "fate.exe" else path.name) for path in exe_files]
              files += [(path, path.name) for path in dll_files]
              if resources_dir.exists():
                  files += [
                      (path, path.relative_to(release_dir))
                      for path in resources_dir.rglob("*")
                      if path.is_file()
                  ]

          if not files:
              raise SystemExit("No Tauri bundle or portable Windows executable was created")

          with ZipFile(asset, "w", ZIP_DEFLATED) as zf:
              for path, arcname in files:
                  zf.write(path, arcname)

          print(asset)
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: release-assets/*.zip
          generate_release_notes: true
